<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 260" width="520" height="260">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8a94a"/>
      <stop offset="50%" style="stop-color:#b8953a"/>
      <stop offset="100%" style="stop-color:#a07830"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ead8"/>
      <stop offset="100%" style="stop-color:#e8dfc8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="520" height="260" fill="#0d0b08"/>

  <!-- Top gold rule -->
  <rect x="0" y="0" width="520" height="2" fill="url(#goldGrad)"/>

  <!-- Concentric rings — right side background decoration -->
  <g transform="translate(440, 130)" opacity="1">
    <circle cx="0" cy="0" r="110" fill="none" stroke="#b8953a" stroke-width="0.5" opacity="0.12"/>
    <circle cx="0" cy="0" r="88"  fill="none" stroke="#b8953a" stroke-width="0.5" opacity="0.18"/>
    <circle cx="0" cy="0" r="66"  fill="none" stroke="#b8953a" stroke-width="0.8" opacity="0.25"/>
    <circle cx="0" cy="0" r="44"  fill="none" stroke="#b8953a" stroke-width="1"   opacity="0.35"/>
    <circle cx="0" cy="0" r="22"  fill="none" stroke="#b8953a" stroke-width="1"   opacity="0.4"/>
  </g>

  <!-- CHESS ENGINE eyebrow -->
  <text x="48" y="68"
    font-family="Cinzel, 'Times New Roman', serif"
    font-size="11"
    fill="#b8953a"
    letter-spacing="6"
    opacity="0.7">CHESS ENGINE</text>

  <!-- EPOCH wordmark — single text element to avoid spacing gaps -->
  <text x="40" y="158"
    font-family="Cinzel, 'Times New Roman', serif"
    font-weight="900"
    font-size="96"
    letter-spacing="4">
    <tspan fill="url(#textGrad)">EP</tspan><tspan fill="#b8953a">O</tspan><tspan fill="url(#textGrad)">CH</tspan>
  </text>

  <!-- Short gold divider -->
  <rect x="42" y="170" width="50" height="1.5" fill="#b8953a" opacity="0.55"/>

  <!-- A NEW ERA OF PLAY tagline -->
  <text x="48" y="194"
    font-family="Cinzel, 'Times New Roman', serif"
    font-size="10"
    fill="#b8953a"
    letter-spacing="5"
    opacity="0.55">A NEW ERA OF PLAY</text>

  <!-- Queen — bottom right -->
  <text x="478" y="238"
    text-anchor="middle"
    font-size="58"
    fill="#b8953a"
    font-family="serif"
    opacity="0.5"
    filter="url(#glow)">♛</text>

  <!-- Bottom gold rule -->
  <rect x="0" y="258" width="520" height="2" fill="url(#goldGrad)"/>
</svg>
